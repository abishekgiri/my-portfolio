<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Abishek | Backend Engineer{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>

<body>
  <div class="page-backdrop" aria-hidden="true"></div>

  <div class="site-shell">
    <header class="site-header" aria-label="Primary">
      <a href="/" class="brand">
        <span class="brand-name">Abishek Kumar Giri</span>
        <span class="brand-role">Backend engineer</span>
      </a>

      <nav class="site-nav">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/projects">Projects</a>
        <a href="/skills">Skills</a>
        <a href="/publications">Research</a>
        <a href="/contact">Contact</a>
        <a href="{{ url_for('static', filename='files/Abishek_Giri_Resume.pdf') }}" target="_blank"
          rel="noopener noreferrer">Resume</a>
      </nav>
    </header>

    <main class="page-content">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div>
        <div class="eyebrow">Currently seeking software engineering internships</div>
        <p class="footer-copy">Backend engineering, distributed systems, and production-style software systems.</p>
      </div>

      <div class="footer-links">
        <a href="/projects">Work</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="https://github.com/abishekgiri" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://linkedin.com/in/abishekgiri" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="{{ url_for('static', filename='files/Abishek_Giri_Resume.pdf') }}" target="_blank"
          rel="noopener noreferrer">Resume</a>
      </div>
    </footer>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
